<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korean Matrimony | Connecting People by Love</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #ff6ec4, #7873f5);
      color: white;
      overflow-x: hidden;
    }
    .netflix-intro {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: black;
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .logo {
      font-size: 3rem;
      font-weight: bold;
      color: #ff4ecb;
    }
    .caption {
      font-size: 1.5rem;
      margin-top: 1rem;
      color: white;
    }
    .btn-start {
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: #ff4ecb;
      border: none;
      font-size: 1rem;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    .onboarding {
      display: none;
      padding: 2rem;
    }
    .question {
      margin-bottom: 2rem;
    }
    .question label {
      display: block;
      margin-bottom: 0.5rem;
    }
    .tags button {
      background: white;
      color: #333;
      padding: 0.5rem 1rem;
      margin: 0.3rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }
    .profile-view {
      display: none;
      text-align: center;
      padding: 2rem;
    }
    .swipe-card {
      border: 2px solid white;
      padding: 2rem;
      border-radius: 16px;
      background: rgba(0,0,0,0.3);
    }
    .swipe-actions button {
      font-size: 2rem;
      background: none;
      border: none;
      margin: 1rem;
      cursor: pointer;
    }
    .map-view {
      display: none;
      padding: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="netflix-intro" id="intro">
    <div class="logo">Korean Matrimony</div>
    <div class="caption">Connecting People by Love</div>
    <button class="btn-start" onclick="startApp()">Start</button>
  </div>  <div class="onboarding" id="onboarding">
    <div class="question">
      <label>Hey! What should we call you?</label>
      <input type="text" id="name" placeholder="Your Name" />
    </div>
    <div class="question">
      <label>When’s your birthday? (We’ll bring the cake!)</label>
      <input type="date" id="birthday" />
    </div>
    <div class="question">
      <label>How do you vibe with gender?</label><br />
      <button onclick="setGender('guy')">I'm a guy</button>
      <button onclick="setGender('girl')">I'm a girl</button>
      <button onclick="setGender('other')">Something else</button>
    </div>
    <div class="question">
      <label>Tell us your story in 1–2 lines.</label>
      <textarea id="bio" maxlength="300"></textarea>
    </div>
    <div class="question">
      <label>What gets your heart racing?</label>
      <div class="tags" id="interests">
        <button>K-pop</button>
        <button>food trips</button>
        <button>late-night talks</button>
        <button>hiking</button>
        <button>coding</button>
        <button>family</button>
        <button>memes</button>
        <button>travel</button>
      </div>
    </div>
    <button class="btn-start" onclick="showProfileView()">Let’s Go!</button>
  </div>  <div class="profile-view" id="profileView">
    <div class="swipe-card">
      <video width="100%" controls>
        <source src="sample.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <p><strong>Jisoo, 25</strong><br />Bio: Loves dancing & coding<br />Flag: Green</p>
    </div>
    <div class="swipe-actions">
      <button style="color:red;">X</button>
      <button style="color:green;">✔</button>
    </div>
    <button class="btn-start" onclick="showMapView()">See Love Map</button>
  </div>  <div class="map-view" id="mapView">
    <h2>Global Love Map</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/World_map_blank_without_borders.svg/2048px-World_map_blank_without_borders.svg.png" width="100%" alt="Love Map" />
  </div>  <script>
    function startApp() {
      document.getElementById("intro").style.display = "none";
      document.getElementById("onboarding").style.display = "block";
      // Optionally play custom sound here
    }
    function setGender(g) {
      console.log("Gender selected:", g);
    }
    function showProfileView() {
      document.getElementById("onboarding").style.display = "none";
      document.getElementById("profileView").style.display = "block";
    }
    function showMapView() {
      document.getElementById("profileView").style.display = "none";
      document.getElementById("mapView").style.display = "block";
    }
  </script></body>
        </html>
